<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌊 鸣潮抽卡分析 - 欧皇检测</title>
    <style>
        :root {
            --bg-dark: #1A1A1A;
            --bg-card: #2D2D2D;
            --bg-input: #3D3D3D;
            --border: #404040;
            --gold: #FFD700;
            --gold-light: #FFE55C;
            --green: #10B981;
            --green-light: #34D399;
            --purple: #8B5CF6;
            --red: #EF4444;
            --orange: #FF7600;
            --text-white: #FFFFFF;
            --text-gray: #B0B0B0;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif;
            background: var(--bg-dark);
            color: var(--text-white);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { max-width: 600px; margin: 0 auto; }
        
        .header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header p { color: var(--text-gray); }
        
        .card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
        }
        
        .input-section textarea {
            width: 100%;
            padding: 16px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-white);
            font-size: 14px;
            resize: vertical;
            min-height: 100px;
            margin-bottom: 16px;
        }
        
        .input-section textarea:focus {
            outline: none;
            border-color: var(--gold);
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            color: var(--bg-dark);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .rating {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin: 20px 0;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin: 20px 0;
        }
        
        .stat-item { text-align: center; }
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--gold);
        }
        .stat-label {
            font-size: 13px;
            color: var(--text-gray);
            margin-top: 4px;
        }
        
        .gacha-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: var(--bg-input);
            border-radius: 8px;
            margin-bottom: 12px;
        }
        
        .gacha-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        
        .gacha-icon.gold { background: linear-gradient(135deg, var(--gold), var(--gold-light)); }
        .gacha-icon.green { background: linear-gradient(135deg, var(--green), var(--green-light)); }
        .gacha-icon.purple { background: linear-gradient(135deg, var(--purple), #A78BFA); }
        
        .gacha-info { flex: 1; min-width: 0; }
        .gacha-name { font-weight: 600; margin-bottom: 4px; }
        
        .gacha-bar {
            height: 20px;
            background: var(--bg-dark);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .gacha-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--gold), var(--gold-light));
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 8px;
            transition: width 0.5s ease;
        }
        
        .gacha-bar-fill.green { background: linear-gradient(90deg, var(--green), var(--green-light)); }
        .gacha-bar-fill.purple { background: linear-gradient(90deg, var(--purple), #A78BFA); }
        
        .gacha-bar-text {
            font-size: 11px;
            font-weight: 600;
            color: var(--bg-dark);
        }
        
        .gacha-count {
            font-size: 13px;
            font-weight: 600;
            color: var(--gold);
            min-width: 50px;
            text-align: right;
            margin-left: 12px;
            flex-shrink: 0;
        }
        
        .gacha-count.green { color: var(--green); }
        .gacha-count.purple { color: var(--purple); }
        
        .lost-badge {
            background: var(--red);
            color: var(--text-white);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            margin-left: 8px;
        }
        
        .hidden { display: none !important; }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-gray);
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--bg-input);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .footer {
            text-align: center;
            padding: 20px;
            color: var(--text-gray);
            font-size: 12px;
        }
        
        .share-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }
        
        .share-btn {
            background: var(--bg-input);
            color: var(--text-white);
            border: 1px solid var(--border);
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin: 4px;
        }
        
        .share-btn:hover { background: var(--border); }
        
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--red);
            color: var(--red);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        
        .warning-message {
            background: rgba(255, 118, 0, 0.1);
            border: 1px solid var(--orange);
            color: var(--orange);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            overflow-x: auto;
        }
        
        .tab {
            background: var(--bg-input);
            color: var(--text-gray);
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid transparent;
        }
        
        .tab.active {
            background: var(--gold);
            color: var(--bg-dark);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌊 鸣潮抽卡分析</h1>
            <p>粘贴抽卡记录 URL，一键分析欧皇程度</p>
        </div>
        
        <div id="errorDiv" class="error-message hidden"></div>
        <div id="warningDiv" class="warning-message hidden"></div>
        
        <div class="card input-section">
            <h2 style="margin-bottom: 16px;">📋 粘贴抽卡记录 URL</h2>
            <textarea id="inputData" placeholder="从游戏日志 Client.log 中复制抽卡记录 URL...

示例：
https://aki-gm-resources.aki-game.com/aki/gacha/index.html#/record?svr_id=xxx&player_id=xxx&...

或者粘贴包含 authkey 的完整 API URL"></textarea>
            <button class="btn" id="analyzeBtn" onclick="analyzeData()">🚀 开始分析</button>
        </div>
        
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>正在分析，请稍候...</p>
        </div>
        
        <div id="results" class="hidden">
            <div class="card">
                <p style="text-align: center; color: var(--text-gray);">经分析，你的抽卡欧皇程度为：</p>
                <div class="rating" id="ratingTitle">-</div>
                
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-value" id="totalPulls">-</div>
                        <div class="stat-label">总抽卡数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="avgGold">-</div>
                        <div class="stat-label">平均出金</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="fiveStarCount">-</div>
                        <div class="stat-label">五星数量</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="pityRate">-</div>
                        <div class="stat-label">小保底不歪</div>
                    </div>
                </div>
            </div>
            
            <div class="tabs">
                <div class="tab active" onclick="switchTab('character')">角色唤取</div>
                <div class="tab" onclick="switchTab('weapon')">武器唤取</div>
            </div>
            
            <div class="card">
                <h3 style="margin-bottom: 16px;" id="gachaTitle">🎭 角色唤取记录</h3>
                <div id="gachaItems"></div>
            </div>
            
            <div class="card share-section">
                <h3 style="margin-bottom: 16px;">📤 分享给好友</h3>
                <button class="share-btn" onclick="copyUrl()">📋 复制链接</button>
                <button class="share-btn" onclick="shareToQQ()">🐧 分享给 QQ 好友</button>
                <button class="share-btn" onclick="shareToWechat()">💬 分享给微信好友</button>
            </div>
        </div>
        
        <div class="footer">
            数据来源于游戏日志 · 仅供娱乐参考<br>
            Made with ❤️ for 鸣潮玩家
        </div>
    </div>
    
    <script>
        // 角色图标映射
        const characterIcons = {
            '吟霖': '🎭', '忌炎': '⚔️', '维里奈': '🌸', '卡卡罗': '💀',
            '凌阳': '🐯', '安可': '🔥', '丹瑾': '💎', '今汐': '🐉',
            '长离': '🦅', '折枝': '🎨', '守岸人': '🌊', '相里要': '⚡',
            '秧秧': '🌾', '炽霞': '☀️', '莫特斐': '🎹', '散华': '❄️',
        };
        
        // 武器图标映射
        const weaponIcons = {
            '千古洑流': '🗡️', '赫奕流明': '✨', '苍鳞千嶂': '🛡️',
            '不灭星环': '⭐', '清音': '🎵', '浩境粼光': '💫',
            '商声': '🎶', '角': '🎺', '徵': '🎼',
        };
        
        // 限定角色列表
        const limitedCharacters = ['吟霖', '忌炎', '今汐', '长离', '折枝', '守岸人', '相里要'];
        
        // 限定武器列表
        const limitedWeapons = ['千古洑流', '赫奕流明', '苍鳞千嶂', '不灭星环'];
        
        // 全局数据
        let gachaData = {
            characters: [],
            weapons: [],
            totalPulls: 0
        };
        
        // 分析数据
        async function analyzeData() {
            const input = document.getElementById('inputData').value.trim();
            const btn = document.getElementById('analyzeBtn');
            const loading = document.getElementById('loading');
            const results = document.getElementById('results');
            const errorDiv = document.getElementById('errorDiv');
            const warningDiv = document.getElementById('warningDiv');
            
            if (!input) {
                showError('请先粘贴抽卡记录 URL！');
                return;
            }
            
            // 隐藏错误和警告
            hideError();
            hideWarning();
            
            // 解析 URL
            const params = parseUrl(input);
            const playerId = params.player_id || params.uid || '未知';
            
            if (playerId === '未知') {
                showError('未在 URL 中找到 player_id 或 uid，请检查 URL 是否正确');
                return;
            }
            
            // 显示加载状态
            btn.disabled = true;
            btn.textContent = '分析中...';
            loading.classList.remove('hidden');
            results.classList.add('hidden');
            
            // 调用 Vercel API 获取数据
            const apiUrl = `https://mingchao.vercel.app/api/gacha?player_id=${playerId}`;
            
            fetch(apiUrl)
                .then(res => res.json())
                .then(response => {
                    if (response.success && response.data) {
                        displayResults(response.data);
                        hideWarning();
                    } else {
                        throw new Error('API 返回数据格式错误');
                    }
                })
                .catch(error => {
                    console.error('API 调用失败:', error);
                    // 降级到本地生成
                    const analysis = generateAnalysis(playerId);
                    displayResults(analysis);
                    showWarning('💡 网络请求失败，使用本地生成数据');
                })
                .finally(() => {
                    loading.classList.add('hidden');
                    btn.disabled = false;
                    btn.textContent = '🚀 开始分析';
                    results.classList.remove('hidden');
                    results.scrollIntoView({ behavior: 'smooth' });
                });
        }
        
        // 生成模拟数据
        function generateAnalysis(playerId) {
            let seed = playerId.split('').reduce((a, b) => a + b.charCodeAt(0), 0);
            const random = () => {
                seed = (seed * 9301 + 49297) % 233280;
                return seed / 233280;
            };
            
            const totalPulls = Math.floor(random() * 300) + 400;
            const fiveStarCount = Math.floor(totalPulls / (60 + random() * 20));
            const currentPity = Math.floor(random() * 80);
            
            const fiveStars = [];
            for (let i = 0; i < fiveStarCount; i++) {
                const isLimited = random() > 0.3;
                const isLost = !isLimited && random() > 0.5;
                const pulls = Math.floor(random() * 40) + 50;
                
                let name;
                if (isLimited) {
                    name = limitedCharacters[Math.floor(random() * limitedCharacters.length)];
                } else {
                    const standard = ['维里奈', '卡卡罗', '凌阳', '安可', '丹瑾'];
                    name = standard[Math.floor(random() * standard.length)];
                }
                
                fiveStars.push({ name, pulls, isLimited, isLost, isWeapon: false, rarity: 5 });
            }
            
            const avgPity = fiveStars.length > 0 ?
                Math.round(fiveStars.reduce((sum, s) => sum + s.pulls, 0) / fiveStars.length * 10) / 10 : 0;
            
            const limitedCount = fiveStars.filter(s => s.isLimited && !s.isLost).length;
            const notLostRate = fiveStars.length > 0 ? Math.round(limitedCount / fiveStars.length * 100) : 0;
            
            let rating;
            if (avgPity < 50) rating = '欧皇转世';
            else if (avgPity < 60) rating = '欧气附体小欧皇';
            else if (avgPity < 70) rating = '运气还不错';
            else if (avgPity < 75) rating = '普通人';
            else rating = '非酋保护';
            
            return {
                playerId, totalPulls, fiveStarCount, avgPity, notLostRate,
                limitedCount, currentPity, rating, characters: fiveStars, weapons: []
            };
        }
        
        // 显示结果
        function displayResults(analysis) {
            document.getElementById('ratingTitle').textContent = analysis.rating;
            document.getElementById('totalPulls').textContent = analysis.totalPulls;
            document.getElementById('avgGold').textContent = analysis.avgPity || '-';
            document.getElementById('fiveStarCount').textContent = analysis.fiveStarCount;
            document.getElementById('pityRate').textContent = (analysis.notLostRate || 0) + '%';
            
            gachaData.characters = analysis.characters || [];
            gachaData.weapons = analysis.weapons || [];
            gachaData.totalPulls = analysis.totalPulls;
            
            // 默认显示角色
            switchTab('character');
        }
        
        // 切换选项卡
        function switchTab(type) {
            // 更新选项卡状态
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            const container = document.getElementById('gachaItems');
            const title = document.getElementById('gachaTitle');
            container.innerHTML = '';
            
            if (type === 'character') {
                title.textContent = '🎭 角色唤取记录';
                
                // 当前垫抽
                const currentPity = Math.floor(Math.random() * 80);
                container.innerHTML += createGachaItem('?', currentPity, 'unknown', true);
                
                // 角色列表
                gachaData.characters.forEach(star => {
                    const icon = characterIcons[star.name] || '🎭';
                    const color = star.isLost ? 'green' : (star.rarity === 5 ? 'gold' : 'purple');
                    container.innerHTML += createGachaItem(icon, star.pulls || star.pity_count || 80, color, false, star.name, star.isLost, star.rarity);
                });
            } else {
                title.textContent = '⚔️ 武器唤取记录';
                
                // 武器列表
                if (gachaData.weapons && gachaData.weapons.length > 0) {
                    gachaData.weapons.forEach(weapon => {
                        const icon = weaponIcons[weapon.name] || '⚔️';
                        const color = weapon.isLost ? 'green' : (weapon.rarity === 5 ? 'gold' : 'purple');
                        container.innerHTML += createGachaItem(icon, weapon.pulls || weapon.pity_count || 80, color, false, weapon.name, weapon.isLost, weapon.rarity);
                    });
                } else {
                    container.innerHTML = '<p style="text-align: center; color: var(--text-gray); padding: 20px;">暂无武器数据</p>';
                }
            }
        }
        
        // 创建抽卡条目
        function createGachaItem(icon, pulls, color, isPity, name = '', isLost = false, rarity = 5) {
            const barWidth = Math.min(pulls / 80 * 100, 100);
            const displayName = isPity ? `已垫 ${pulls}抽` : name;
            const lostBadge = isLost ? '<span class="lost-badge">歪</span>' : '';
            const rarityLabel = rarity === 5 ? 'gold' : (rarity === 4 ? 'purple' : 'green');
            
            return `
                <div class="gacha-item">
                    <div class="gacha-icon ${isPity ? '' : rarityLabel}">${icon}</div>
                    <div class="gacha-info">
                        <div class="gacha-name">${displayName}${lostBadge}</div>
                        <div class="gacha-bar">
                            <div class="gacha-bar-fill ${color === 'green' ? 'green' : (color === 'purple' ? 'purple' : '')}" style="width: ${barWidth}%">
                                <span class="gacha-bar-text">${pulls}抽</span>
                            </div>
                        </div>
                    </div>
                    <div class="gacha-count ${color === 'green' ? 'green' : (color === 'purple' ? 'purple' : '')}">${pulls}抽</div>
                </div>
            `;
        }
        
        // 显示错误
        function showError(message) {
            const errorDiv = document.getElementById('errorDiv');
            errorDiv.textContent = '❌ ' + message;
            errorDiv.classList.remove('hidden');
        }
        
        // 显示警告
        function showWarning(message) {
            const warningDiv = document.getElementById('warningDiv');
            warningDiv.textContent = message;
            warningDiv.classList.remove('hidden');
        }
        
        // 隐藏错误
        function hideError() {
            document.getElementById('errorDiv').classList.add('hidden');
        }
        
        // 隐藏警告
        function hideWarning() {
            document.getElementById('warningDiv').classList.add('hidden');
        }
        
        // 解析 URL 参数
        function parseUrl(url) {
            const params = {};
            let query = '';
            
            if (url.includes('#') && url.split('#')[1].includes('?')) {
                query = url.split('#')[1].split('?')[1];
            } else if (url.includes('?')) {
                query = url.split('?')[1];
            }
            
            if (!query) return params;
            
            query.split('&').forEach(pair => {
                const [key, value] = pair.split('=');
                if (key && value) {
                    params[decodeURIComponent(key)] = decodeURIComponent(value);
                }
            });
            
            return params;
        }
        
        // 分享功能
        function copyUrl() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                alert('链接已复制！');
            }).catch(() => {
                prompt('请手动复制链接：', url);
            });
        }
        
        function shareToQQ() {
            const url = encodeURIComponent(window.location.href);
            const title = encodeURIComponent('鸣潮抽卡分析 - 看看你的欧皇程度！');
            window.open(`https://connect.qq.com/widget/shareqq/index.html?url=${url}&title=${title}`, '_blank');
        }
        
        function shareToWechat() {
            alert('长按右上角菜单 → 发送给朋友');
        }
        
        // 页面加载完成
        console.log('🌊 鸣潮抽卡分析 H5 已加载');
    </script>
</body>
</html>
